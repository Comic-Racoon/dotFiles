# ── tmux.conf ───────────────────────────────────────────────────────────────
# Location: ~/.config/tmux/tmux.conf

# ── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g default-shell /bin/zsh

set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g display-time 2000
set -g status-interval 5
set -g focus-events on
set -g escape-time 0
set -sg repeat-time 600

# ── Status Bar Position ───────────────────────────────────────────────────────
set -g status-position top

# ── Vi Mode in Copy Mode ─────────────────────────────────────────────────────
set -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

bind [ copy-mode

# ── Window & Pane Management ─────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# ── Session Management with sesh ─────────────────────────────────────────────
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' \
    --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --color 'border:#cba6f7,label:#cba6f7'
)\""

bind Space switch-client -l

# ── Reload Config ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ── Plugins (TPM) ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ── Catppuccin Theme ──────────────────────────────────────────────────────────
set -g @catppuccin_flavor 'mocha'

# Window style — rounded pill tabs like the screenshot
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag,  ,}"

# Status bar — left: windows, right: session + directory + time
set -g status-left-length 80
set -g status-right-length 150

set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# Right side modules: session name → directory → date/time
set -g @catppuccin_status_modules_right "session directory date_time"
set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M"
set -g @catppuccin_directory_text "#{pane_current_path}"

# Pane borders — subtle, Catppuccin-tinted
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# ── tmux-resurrect / continuum ───────────────────────────────────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# ── Initialize TPM (keep this line at the very bottom) ───────────────────────
run '~/.tmux/plugins/tpm/tpm'
